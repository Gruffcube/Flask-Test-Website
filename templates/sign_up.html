{% extends "base.html" %}



{% block title %}Sign Up{% endblock %}



{% block content %}

    <h1>Sign Up</h1>
    
    <form method="POST" action="{{ url_for('main.sign_up') }}">
    
        <div class='box_widget'>
            
            <label for="fname">First name:</label>
            <input type="text" id="fname" name="fname" required><br>
            <label for="lname">Last name:</label>
            <input type="text" id="lname" name="lname" required><br>
            <label for="email">Email address:</label>
            <input type="text" id="email" name="email" required><br>
            
        </div>
        
        <div class='box_widget'>
            
            <label for="password">Enter a secure password:</label>
            <input type="password" id="password" name="password" required><br>
            <label for="password_conf">Confirm your password:</label>
            <input type="password" id="password_conf" name="password_conf" required><br>
            
        </div>
        
        <input type="submit" value="Create Account">
    
    </form>
    
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}
                <p>{{ message }}</p>
            {% endfor %}
        {% endif %}
    {% endwith %}


{% endblock %}
